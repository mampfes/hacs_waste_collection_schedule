# Per-source overrides for publidata_fr (it).
---
params:
  address:
    description: Solo indirizzo stradale (es. '4 rue de Paris'). Non includere città
      o codice postale.
  insee_code:
    description: Il codice INSEE a 5 cifre del tuo comune. Verifica su https://www.insee.fr
      se il tuo comune è stato unito (nuovo codice).
    label: Codice INSEE
  instance_id:
    description: Precompilato quando selezioni un fornitore noto. Necessario solo
      per fornitori non elencati (trovato tramite ispettore di rete sul widget rifiuti
      del fornitore).
    label: ID Istanza
  public_type:
    description: Filtro tipo abitazione (opzionale). Usare 'individual_housing' per
      case o 'collective_housing' per appartamenti se la zona ha calendari diversi
      per tipo di abitazione.
    label: Tipo Abitazione
