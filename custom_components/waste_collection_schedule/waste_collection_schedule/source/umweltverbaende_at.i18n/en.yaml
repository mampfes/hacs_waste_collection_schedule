# Per-source overrides for umweltverbaende_at (en).
---
params:
  address_suffix:
    description: (New Website only) Not needed in most cases leave empty and only
      use if you get an error without it.
    label: Addition
  calendar:
    description: (Old website only) If you see multiple collection calendars for your
      municipality (different streets or Rayons), you can specify the calendar name
      here. The calendar name should be spelt as it appears on the Abholtermine page
      below `Kalenderansicht`.
  calendar_splitter:
    description: '(Old website only) rarely needed, only works if `calendar` is set.
      Only needed if multiple collections are shown in one line. This is the character
      that separates the collection times, that are listed in one line. Like `Bisamberg
      Zone B, RestmĂĽll 14-tĂ¤gig: Gelber Sack` (`:` is the separator). You can see
      the text the integration will use, at the Abholtermine page below `Kalenderansicht`.'
    label: Calendar entry splitter
  calendar_title_separator:
    description: '(Old website only) rarely needed, only works if `calendar` is set.
      This is the character that separates the calendar title from the collection
      dates. Like `Tour 1: RestmĂĽll` (`:` is the separator which is the default value)
      or `Bisamberg Zone B, RestmĂĽll 14-tĂ¤gig` (`,` is the separator). You can see
      the text the integration will use, at the Abholtermine page below `Kalenderansicht`.'
  district:
    description: Subdomain of the waste collection provider; one of `baden`, `gmuend`,
      `gaenserndorf`, `hollabrunn`, `horn`, `korneuburg`, `krems`, `lilienfeld`, `laa`,
      `moedling`, `melk`, `mistelbach`, `stpoeltenland`, `scheibbs`, `schwechat`,
      `waidhofen`, `zwettl`.
    label: District/Service provider id
  house_number:
    description: (New Website only) Not needed in most cases leave empty and only
      use if you get an error without it.
  postcode:
    description: (New Website only) Not needed in most cases leave empty and only
      use if you get an error without it.
    label: Postal code
  street:
    description: (New Website only) Not needed in most cases leave empty and only
      use if you get an error without it.
  town:
    description: (New Website only) Not needed in most cases leave empty and only
      use if you get an error without it.
