# Per-source overrides for mzv_rotenburg_bebra_de (en).
---
params:
  city:
    description: 'Should be spelled exactly like in the `ort` URL parameter of the
      link url shown on the website: https://www.mzv-rotenburg-bebra.de//webapp.html
      Like: `lisp`, `rot`, `bebra`, ...'
  paper_route:
    description: Used if there are multiple routes for the paper collection. E.g 'Rotenburg
      - Kernstadt' has paper collection routes `West` and `Ost`.
  yellow_route:
    description: Used if there are multiple routes for the yellow bin collection.
      E.g 'Rotenburg - Kernstadt' has yellow bin collection routes `1`,`2`,`3` and
      `4`.
