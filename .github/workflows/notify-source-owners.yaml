name: Notify Source Owners

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  notify-source-owners:
    if: contains(github.event.issue.title, '[Bug]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify mapped source owners
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const body = issue.body || '';
            const marker = '<!-- source-owner-notified -->';

            const match = body.match(/###\s*Source \(if relevant\)\s*\n\n([^\n]+)/i);
            if (!match) {
              core.info('No source field found in issue form body.');
              return;
            }

            const rawSource = match[1].trim();
            if (!rawSource) {
              core.info('Source field is empty.');
              return;
            }

            const normalizedSource = rawSource.toLowerCase().replace(/\.py$/, '');
            core.info(`Normalized source: ${normalizedSource}`);

            const mapping = JSON.parse(fs.readFileSync('.github/source_owners.json', 'utf8'));
            const sourceOwners = mapping.sources?.[normalizedSource] || [];
            const defaultOwners = mapping.default || [];
            const owners = [...new Set([...sourceOwners, ...defaultOwners])];

            if (owners.length === 0) {
              core.info('No owners configured for this source and no default owners configured.');
              return;
            }

            const ownerMentions = owners.join(' ');
            const commentBody = `${marker}\nPing ${ownerMentions}\n\nA bug was reported for source \`${normalizedSource}\`. Please take a look when possible.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });
            if (comments.some((comment) => (comment.body || '').includes(marker))) {
              core.info('Source owner notification already posted.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody,
            });

            const assignees = owners
              .filter((owner) => owner.startsWith('@'))
              .map((owner) => owner.slice(1));

            if (assignees.length > 0) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees,
                });
              } catch (error) {
                core.warning(`Could not assign owners: ${error.message}`);
              }
            }
