---
name: Validate Waste Collection Schedule

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum
            python_version: '3.12'
            homeassistant_spec: homeassistant==2024.4.0
            josepy_spec: josepy<2
          - lane: current
            python_version: '3.14'
            homeassistant_spec: homeassistant
            josepy_spec: josepy

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest -r requirements.txt "${{ matrix.homeassistant_spec }}" "${{ matrix.josepy_spec }}"
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check . --select E9,F63,F7,F82 --output-format=full --statistics
      - name: Run pre-commit (PR changes only)
        if: github.event_name == 'pull_request'
        run: |
          pip install pre-commit
          pre-commit run --show-diff-on-failure --color=always --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}
      - name: Test with pytest
        run: |
          python -c "from custom_components.waste_collection_schedule import config_flow"
          pytest
