---
name: Validate Waste Collection Schedule

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pyspelling
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Install hunspell dictionaries
        run: |
          sudo apt-get update
          sudo apt-get install -y hunspell hunspell-en-us hunspell-de-de \
                                  hunspell-fr hunspell-it
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        run: |
          pytest
      - name: Spell-check i18n catalogs (per-language)
        # Non-blocking: hunspell flags many legitimate compound German
        # words, place names, provider acronyms, and source-specific
        # jargon. Maintaining an exhaustive wordlist is high-effort and
        # the false-positive rate would mask real typos. Treat the
        # output as a report; contributors and reviewers can use it to
        # spot issues without blocking the build.
        continue-on-error: true
        run: |
          python scripts/build_wordlists.py
          pyspelling -c .pyspelling.yml
