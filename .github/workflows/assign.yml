name: Assign Issue

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required permission for the action to assign users
    steps:
      - name: Assign Me Action
        # Pinned to the v3.1.0 commit SHA for supply-chain safety
        uses: takanome-dev/assign-issue-action@c7086b052ac0039e7192085e82de2f9d74080f0b # v3.1.0
        with:
          github_token: "${{ github.token }}"
