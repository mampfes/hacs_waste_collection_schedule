howto:
  en: |
    - Go to <https://www.sherbrooke.ca/fr/services-a-la-population/collecte-des-matieres-residuelles/calendrier-des-collectes>
    - Enter your address to retrieve your personalized calendar ICS URL
    - Copy the ICS URL (right-click the calendar link and select "Copy link address")
    - Use this URL as the `url` parameter.
    - Example URL pattern: `https://api.sherbrooke.ca/collection-schedules/calendars/{calendar}/sectors/{sector}/days/{day}/ics`
  fr: |
    - Allez à <https://www.sherbrooke.ca/fr/services-a-la-population/collecte-des-matieres-residuelles/calendrier-des-collectes>
    - Entrez votre adresse pour obtenir l'URL personnalisée de votre calendrier ICS
    - Copiez l'URL ICS (faites un clic droit sur le lien du calendrier et sélectionnez "Copier l'adresse du lien")
    - Utilisez cette URL comme paramètre `url`.
    - Modèle d'URL: `https://api.sherbrooke.ca/collection-schedules/calendars/{calendar}/sectors/{sector}/days/{day}/ics`
