    - Use this copied URL as the `url` parameter.
    - You can trim the tracking data after the `codeZone=#`
  fr: |
    - Si vous ne connaissez pas votre secteur, allez à `https://www.laval.ca/recherche-par-adresse/` et entrez votre adresse pour identifier votre matricule de maison et votre zone.
    - Faites un clic droit sur 'Ajouter à mon agenda' et sélectionnez `Copier l'adresse du lien`.
    - Utilisez ce lien copié comme paramètre `url`.
    - Vous pouvez supprimer les données de suivi après `codeZone=#`
