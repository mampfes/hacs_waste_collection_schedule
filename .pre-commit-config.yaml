---
repos:
  # pyupgrade is covered by ruff's UP rule set now (see ruff.toml target-version).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      # Linting (replaces flake8 + isort).
      - id: ruff
        args: [--fix]
        files: ^(custom_components|script|tests)/.+\.py$|^[^/]+\.py$
      # Formatting (replaces black). Runs on the full tree, like black did.
      - id: ruff-format
        files: ^(custom_components|script|tests)/.+\.py$|^[^/]+\.py$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - -I
          - .codespellignore
          - --skip="./.*,*.csv,*.json"
          - --quiet-level=2
        exclude_types: [csv, json]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - --quiet
          - --format=custom
          - --configfile=tests/bandit.yaml
        files: ^(custom_components|script|tests)/.+\.py$|^[^/]+\.py$
        # Source modules carry pre-existing bandit warnings (mostly
        # xml.etree.ElementTree usage) that are out of scope for the
        # canonical-icons migration. Source-level security review is
        # a separate effort.
        exclude: ^custom_components/waste_collection_schedule/waste_collection_schedule/source/
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args: [--mapping, '2', --sequence, '4', --width, '150', --offset, '2']
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
        stages: [manual]
      - id: check-json
        exclude: ^(\.(devcontainer|vscode)/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-python-dateutil, types-pyyaml]
        # Source modules carry many latent type issues that pre-date the
        # canonical-icons migration; type-checking them is a separate effort.
        # Mypy still runs on the integration layer and core library.
        exclude: ^custom_components/waste_collection_schedule/waste_collection_schedule/source/
        args:
          - --pretty
          - --show-error-codes
          - --show-error-context
          - --ignore-missing-imports
          - --explicit-package-bases
  - repo: local
    hooks:
      # Pyright strict-ish type checking for the NEW pipeline architecture only.
      # Scope (core library, the four pipeline service modules, and every
      # BaseSource source) is defined by the `include` list in pyrightconfig.json;
      # legacy source/ modules are intentionally excluded. New-arch sources are
      # added to that include list as they migrate. Runs via `npx pyright` so it
      # picks up pyrightconfig.json; needs Node/npx on PATH.
      - id: pyright
        name: pyright (new architecture)
        entry: npx --yes pyright
        language: system
        pass_filenames: false
        files: ^custom_components/waste_collection_schedule/waste_collection_schedule/(base_source|parsers|preprocessors|transformers|recurrence|regions|retrievers|date_parsers|config_params|waste_types|collection|collection_aggregator|exceptions|icons|source_shell|__init__)\.py$|^custom_components/waste_collection_schedule/waste_collection_schedule/service/(ArcGis|RiSKommunalAT|AbfallnaviDe|IntraMaps)\.py$|^custom_components/waste_collection_schedule/waste_collection_schedule/source/.+\.py$
