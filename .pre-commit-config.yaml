---
repos:
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        args: [--py37-plus]
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args:
          - --safe
          - --quiet
        files: ^((custom_components|script|tests)/.+)?[^/]+\.py$
  # pyspelling replaces codespell. Per-language hunspell dictionaries
  # spell-check each language's i18n YAML file (en against en_US, de against
  # de_DE, etc.) plus the TITLE / DESCRIPTION strings extracted from source
  # modules. Project-specific allowed words live in .spelling/<lang>.wordlist.
  # See .pyspelling.yml for the matrix.
  #
  # Manual run:  pyspelling -c .pyspelling.yml
  # Local install:  pip install pyspelling   (then sudo apt install hunspell + dicts)
  - repo: local
    hooks:
      - id: pyspelling
        name: pyspelling (per-language)
        language: system
        pass_filenames: false
        entry: bash -c 'python scripts/extract_titles.py && pyspelling -c .pyspelling.yml'
        files: ^(custom_components/waste_collection_schedule/i18n/|custom_components/waste_collection_schedule/waste_collection_schedule/source/.+\.py$|\.spelling/|\.pyspelling\.yml$)
        stages: [manual]
  - repo: https://github.com/pycqa/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args:
          - --ignore=D100,D101,D102,D103,D104,D105,D106,D107,E501,W503,E203
        additional_dependencies:
          - flake8-docstrings==1.5.0
          - pydocstyle==5.0.2
        files: ^(custom_components|script|tests)/.+\.py$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args:
          - --quiet
          - --format=custom
          - --configfile=tests/bandit.yaml
        files: ^(custom_components|script|tests)/.+\.py$
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args: [--mapping, '2', --sequence, '4', --width, '150', --offset, '2']
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args:
          - --multi-line=3
          - --trailing-comma
          - --profile=black
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-executables-have-shebangs
        stages: [manual]
      - id: check-json
        exclude: ^(\.(devcontainer|vscode)/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-python-dateutil, types-pyyaml]
        args:
          - --pretty
          - --show-error-codes
          - --show-error-context
          - --ignore-missing-imports
          - --explicit-package-bases
