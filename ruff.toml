# The runtime floor is Python 3.12 (Home Assistant >= 2024.4; see hacs.json /
# requirements.txt), so the lint target matches it. UP/pyupgrade therefore
# modernises the new-architecture code (framework, services, tools) to 3.12
# idioms. The ~600 legacy provider modules under source/ are exempted from UP
# only (see per-file-ignores) so the migration is not blocked by mechanically
# rewriting them; they still get E/F/W/I/B and the rest.
target-version = "py312"
line-length = 88

[lint]
# Mirror the previous flake8 + isort behaviour: pycodestyle (E/W), pyflakes (F)
# and import sorting (I, equivalent to isort profile=black). E203/E501 were
# ignored by flake8; E721 is stricter in ruff than pycodestyle, so keep it off
# to avoid new findings the old tool chain never reported.
# B (bugbear), C4 (comprehensions), PIE and RUF catch real bugs/dead code
# cheaply across the whole tree, including source/.
# UP (pyupgrade) replaces the standalone pyupgrade pre-commit hook - one tool,
# one target-version. ISC (implicit string concat) and RET (flake8-return)
# resolved fully clean across the whole tree with zero manual fixes needed.
# SIM/PERF/T20 were evaluated too, but almost every hit there has no automatic
# fix and would mean hand-rewriting hundreds of loops/prints across source/ -
# deferred to a separate, deliberate cleanup effort rather than bundled here.
select = ["E", "F", "W", "I", "B", "C4", "PIE", "RUF", "UP", "ISC", "RET"]
# E203/E501/E721: see above. RUF001-003 flag "ambiguous" unicode (en-dashes,
# curly quotes) that legitimately occurs in non-English provider names/titles.
# RET503/RET504 have no automatic fix and would require hand-rewriting return
# statements across dozens of source/ files for a purely stylistic gain -
# not worth the manual diff right now.
# UP046/UP047 (PEP 695 class/function type parameters) are not adopted: the
# framework API (BaseSource, BaseTransformer, exception hierarchy) reads more
# clearly with explicit Generic[T]/TypeVar, and the auto-rewrite leaves orphaned
# TypeVars. Other UP rules (datetime.UTC, `type` aliases, StrEnum, dead version
# blocks) are applied to the new architecture.
ignore = ["E203", "E501", "E721", "RUF001", "RUF002", "RUF003", "RET503", "RET504", "UP046", "UP047"]

[lint.per-file-ignores]
# Legacy provider modules are exempt from pyupgrade (UP) only: modernising 600
# hand-written sources to 3.12 idioms is churn without runtime benefit and would
# stall the pipeline migration. New-architecture code is not exempt. All other
# rules (E/F/W/I/B/C4/PIE/RUF/ISC/RET) still apply to source/.
"custom_components/waste_collection_schedule/waste_collection_schedule/source/*.py" = ["UP"]

[format]
quote-style = "double"
indent-style = "space"
