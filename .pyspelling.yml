# Per-language spell-check matrix for the i18n catalogs.
#
# Each language file in i18n/shared, i18n/phrases, and i18n/sources gets
# checked against the matching hunspell dictionary. Project-specific
# allowed words live in .spelling/<lang>.wordlist (place names, council
# acronyms, technical terms not in the standard dictionary).
#
# Run:  pyspelling -c .pyspelling.yml
# CI installs hunspell + the en/de/fr/it dictionaries; locally on Linux:
#   sudo apt-get install -y hunspell hunspell-en-us hunspell-de-de \
#                           hunspell-fr hunspell-it
#
# Author can scope a single language with:
#   pyspelling -c .pyspelling.yml --name shared-en
spellchecker: hunspell

matrix:
  # ------------------------------------------------------------------ EN
  - name: shared-en
    sources:
      - 'custom_components/waste_collection_schedule/i18n/shared/en.yaml'
      - 'custom_components/waste_collection_schedule/i18n/phrases/en.yaml'
      - 'custom_components/waste_collection_schedule/i18n/sources/**/en.yaml'
    hunspell:
      d: en_US
    dictionary:
      wordlists:
        - .spelling/en.wordlist
      output: build/dictionary/en.dic
    pipeline:
      - pyspelling.filters.context:
          context_visible_first: true
          escapes: '\\[\\`]'
          delimiters:
            # strip YAML comment lines (# ... to end-of-line) -- the
            # auto-generated header comments in per-source override files
            # are English regardless of the per-language dictionary used.
            - open: '(?m)^\s*#'
              close: '$'
            # strip {placeholders} so format strings don't tank the check
            - open: '\{'
              close: '\}'
      - pyspelling.filters.text:
      - pyspelling.filters.url:

  # ------------------------------------------------------------------ DE
  - name: shared-de
    sources:
      - 'custom_components/waste_collection_schedule/i18n/shared/de.yaml'
      - 'custom_components/waste_collection_schedule/i18n/phrases/de.yaml'
      - 'custom_components/waste_collection_schedule/i18n/sources/**/de.yaml'
    hunspell:
      d: de_DE
    dictionary:
      wordlists:
        - .spelling/de.wordlist
      output: build/dictionary/de.dic
    pipeline:
      - pyspelling.filters.context:
          context_visible_first: true
          escapes: '\\[\\`]'
          delimiters:
            - open: '(?m)^\s*#'
              close: '$'
            - open: '\{'
              close: '\}'
      - pyspelling.filters.text:
      - pyspelling.filters.url:

  # ------------------------------------------------------------------ FR
  - name: shared-fr
    sources:
      - 'custom_components/waste_collection_schedule/i18n/shared/fr.yaml'
      - 'custom_components/waste_collection_schedule/i18n/phrases/fr.yaml'
      - 'custom_components/waste_collection_schedule/i18n/sources/**/fr.yaml'
    hunspell:
      d: fr_FR
    dictionary:
      wordlists:
        - .spelling/fr.wordlist
      output: build/dictionary/fr.dic
    pipeline:
      - pyspelling.filters.context:
          context_visible_first: true
          escapes: '\\[\\`]'
          delimiters:
            - open: '(?m)^\s*#'
              close: '$'
            - open: '\{'
              close: '\}'
      - pyspelling.filters.text:
      - pyspelling.filters.url:

  # ------------------------------------------------------------------ IT
  - name: shared-it
    sources:
      - 'custom_components/waste_collection_schedule/i18n/shared/it.yaml'
      - 'custom_components/waste_collection_schedule/i18n/phrases/it.yaml'
      - 'custom_components/waste_collection_schedule/i18n/sources/**/it.yaml'
    hunspell:
      d: it_IT
    dictionary:
      wordlists:
        - .spelling/it.wordlist
      output: build/dictionary/it.dic
    pipeline:
      - pyspelling.filters.context:
          context_visible_first: true
          escapes: '\\[\\`]'
          delimiters:
            - open: '(?m)^\s*#'
              close: '$'
            - open: '\{'
              close: '\}'
      - pyspelling.filters.text:
      - pyspelling.filters.url:

# TITLE / DESCRIPTION / EXTRA_INFO[].title strings are not spell-checked.
# They're dominated by provider names ("AMSA", "Iren Ambiente"), place
# names ("Mérignac", "Beltershausen") and acronyms — every real
# dictionary flags these as misspelled. The wordlist would essentially
# need to enumerate every place / company / brand the integration
# supports, which adds maintenance burden without surfacing real typos.
# Scoped UI text (parameter labels and descriptions, exception phrases)
# IS still checked via the matrix entries above.
